version: "3.1"

intents:
  - out_of_scope
  - request_offset_programs
  - request_eco_tips
  - request_activities
  - request_cultural_info
  - bot_challenge
  - goodbye
  - book_trip
  - request_carbon_info
  - request_eco_hotels
  - request_help
  - affirm
  - deny

slots:
  origin:
    type: text
    mappings:
      - type: from_llm
  destination:
    type: text
    mappings:
      - type: from_llm
  travel_dates:
    type: text
    mappings:
      - type: from_llm
  budget_amount:
    type: float
    mappings:
      - type: from_llm
  num_travellers:
    type: float
    initial_value: 1
    mappings:
      - type: from_llm
  eco_level:
    type: text
    initial_value: moderate
    mappings:
      - type: from_llm
  transport_mode:
    type: categorical
    values:
      - flight
      - train
      - bus
      - car
      - ferry
      - walking
      - cycling
    mappings:
      - type: from_llm
  trip_type:
    type: text
    initial_value: round_trip
    mappings:
      - type: from_llm
  awaiting_review:
    type: categorical
    values:
      - confirm
      - modify
      - cancel
    mappings:
      - type: from_llm
  booking_reference:
    type: text
    mappings:
      - type: controlled
  price_total:
    type: float
    mappings:
      - type: controlled
  carbon_score:
    type: float
    influence_conversation: false
    mappings:
      - type: controlled
  itinerary_draft:
    type: bool
    initial_value: false
    influence_conversation: false
    mappings:
      - type: controlled
  itinerary_confirmed:
    type: bool
    initial_value: false
    influence_conversation: false
    mappings:
      - type: controlled
  escalated:
    type: bool
    initial_value: false
    influence_conversation: false
    mappings:
      - type: controlled
  transport_options:
    type: any
    influence_conversation: false
    mappings:
      - type: controlled
  hotel_options:
    type: any
    influence_conversation: false
    mappings:
      - type: controlled
  destination_info:
    type: any
    influence_conversation: false
    mappings:
      - type: controlled
  fallback_count:
    type: float
    initial_value: 0
    influence_conversation: false
    mappings:
      - type: controlled
  modification_count:
    type: float
    initial_value: 0
    influence_conversation: false
    mappings:
      - type: controlled
  user_id:
    type: text
    influence_conversation: false
    mappings:
      - type: controlled
  conversation_id:
    type: text
    influence_conversation: false
    mappings:
      - type: controlled
  modification_choice:
    type: categorical
    values:
      - origin
      - destination
      - travel_dates
      - budget_amount
      - num_travellers
      - eco_level
      - transport_mode
    mappings:
      - type: from_llm
  fetch_travel_options_confirmed:
    type: bool
    mappings:
      - type: from_llm
  final_booking_decision:
    type: categorical
    values:
      - confirm
      - modify
      - cancel
      - restart
    mappings:
      - type: from_llm

responses:
  utter_greet:
    - text: |
        🌿 Welcome to **NovaPlan.ai** — your sustainable travel advisor!
        I help you plan low-carbon journeys with verified eco options.
        Ready to plan your next trip?
      buttons:
        - title: "🗺️ Plan a trip"
          payload: "I want to plan a sustainable trip"
        - title: "♻️ Carbon footprint"
          payload: "I want to calculate my carbon footprint"
        - title: "🏨 Eco hotels"
          payload: "Show me eco hotels"
        - title: "❓ Help"
          payload: "Help"

  utter_ask_origin:
    - text: "🏠 Where will you be travelling **from**? *(e.g. Berlin, London, Paris)*"

  utter_ask_destination:
    - text: "🌍 Where would you like to travel **to**? *(e.g. Amsterdam, Lisbon, Barcelona)*"

  utter_ask_travel_dates:
    - text: "📅 When are you planning to travel? *(e.g. 15-20 June, next weekend, July 10 for 5 days)*"

  utter_ask_num_travellers:
    - text: "👥 How many people are travelling (including you)?"

  utter_ask_eco_level:
    - text: "🌱 How important is sustainability to you for this trip?"
      buttons:
        - title: "🌿 Just a little greener"
          payload: "/SetSlots(eco_level=low)"
        - title: "♻️ Actively eco-friendly"
          payload: "/SetSlots(eco_level=moderate)"
        - title: "🌍 Maximum sustainability"
          payload: "/SetSlots(eco_level=high)"

  utter_ask_budget_amount:
    - text: "💰 What's your approximate **total budget** for the trip (in EUR)?"
      buttons:
        - title: "Under €500"
          payload: "/SetSlots(budget_amount=400)"
        - title: "€500 – €1,500"
          payload: "/SetSlots(budget_amount=1000)"
        - title: "€1,500 – €3,000"
          payload: "/SetSlots(budget_amount=2000)"
        - title: "€3,000+"
          payload: "/SetSlots(budget_amount=4000)"

  utter_ask_transport_mode:
    - text: |
        🚆 How would you like to travel from {origin} to {destination}?
        I'll calculate the carbon impact first, then ask before fetching live ticket options.
      buttons:
        - title: "✈️ Flight"
          payload: "/SetSlots(transport_mode=flight)"
        - title: "🚆 Train"
          payload: "/SetSlots(transport_mode=train)"
        - title: "🚌 Bus"
          payload: "/SetSlots(transport_mode=bus)"
        - title: "🚗 Car"
          payload: "/SetSlots(transport_mode=car)"
        - title: "⛴️ Ferry"
          payload: "/SetSlots(transport_mode=ferry)"
        - title: "🚶 Walking"
          payload: "/SetSlots(transport_mode=walking)"
        - title: "🚴 Cycling"
          payload: "/SetSlots(transport_mode=cycling)"

  utter_ask_awaiting_review:
    - text: "✅ Do you want to continue with booking this trip, or modify something first?"
      buttons:
        - title: "✅ Continue with booking"
          payload: "/SetSlots(awaiting_review=confirm)"
        - title: "✏️ Modify trip details"
          payload: "/SetSlots(awaiting_review=modify)"
        - title: "❌ Cancel"
          payload: "/SetSlots(awaiting_review=cancel)"

  utter_ask_modification_choice:
    - text: "✏️ What would you like to modify?"
      buttons:
        - title: "🏠 Origin"
          payload: "/SetSlots(modification_choice=origin)"
        - title: "📍 Destination"
          payload: "/SetSlots(modification_choice=destination)"
        - title: "📅 Dates"
          payload: "/SetSlots(modification_choice=travel_dates)"
        - title: "💰 Budget"
          payload: "/SetSlots(modification_choice=budget_amount)"
        - title: "👥 Travellers"
          payload: "/SetSlots(modification_choice=num_travellers)"
        - title: "🌱 Eco level"
          payload: "/SetSlots(modification_choice=eco_level)"
        - title: "🚗 Transport"
          payload: "/SetSlots(modification_choice=transport_mode)"

  utter_origin_equals_destination:
    - text: "⚠️ Your origin and destination are the same city. Please enter a different destination."

  utter_goodbye:
    - text: "🌱 Thanks for choosing sustainable travel! Safe and green journeys ahead! ✈️🌍"

  utter_out_of_scope:
    - text: |
        🌿 I'm your dedicated **eco-travel assistant** — I'm best at:
        • Sustainable trip planning
        • Carbon footprint calculations
        • Eco-certified hotel recommendations
        • Green transport options

        Would you like help with any of these?
      buttons:
        - title: "🗺️ Plan a trip"
          payload: "I want to plan a sustainable trip"
        - title: "📊 Carbon footprint"
          payload: "I want to calculate my carbon footprint"

  utter_ask_rephrase:
    - text: "🤔 I didn't quite catch that. Could you rephrase?"

  utter_default_fallback:
    - text: "😕 I'm still having trouble understanding. Let me connect you with a human travel specialist."

  utter_escalation_initiated:
    - text: |
        👤 **Connecting you to a travel specialist...**
        I've packaged your trip details for the advisor.
        A specialist will follow up shortly.

  utter_start_over_confirm:
    - text: "🔄 Starting fresh! What would you like to plan?"
      buttons:
        - title: "🗺️ New trip"
          payload: "I want to plan a sustainable trip"
        - title: "📊 Carbon check"
          payload: "I want to calculate my carbon footprint"

  utter_bot_challenge:
    - text: "🤖 I'm NovaPlan.ai, an AI travel advisor built with Rasa Pro CALM. I'm here to help you plan sustainable journeys!"

  utter_help:
    - text: |
        🌿 **NovaPlan.ai — Help Guide**

        Here's what I can do:
        • **Plan trips** — just describe your trip naturally and I'll handle the rest
        • **Carbon footprint** — real-time CO₂ estimates per transport mode
        • **Eco hotels** — verified green-certified accommodation options
        • **Transport comparison** — trains, buses, flights ranked by emissions
        • **Cultural tips** — responsible tourism guidance for your destination
        • **Human handover** — escalate to a travel specialist anytime

        Try: *"I want to go from Berlin to Paris next Friday for 2 people, budget 800 euros"*

  utter_affirm:
    - text: "✅ Got it! Let's continue."

  utter_deny:
    - text: "No problem! Let me know if you'd like to change anything."

  utter_itinerary_created:
    - text: "🎉 Your sustainable itinerary has been created and saved for this session."
  
  utter_human_handover_available:
    - text: "I can connect you with a human representative if you need additional assistance."

  utter_booking_confirmed:
    - text: |
        ✅ **Booking Confirmed!**

        Reference: {booking_reference}
        Total: €{price_total}

        Have a wonderful, sustainable trip! 🌍

  utter_itinerary_summary:
    - text: |
        📋 **Review Your Trip:**

        🏠 **From:** {origin}
        🌍 **To:** {destination}
        📅 **Dates:** {travel_dates}
        💰 **Budget:** €{budget_amount}
        👥 **Travellers:** {num_travellers}
        🌱 **Eco Level:** {eco_level}
        🚗 **Transport:** {transport_mode}

        Ready to book or make changes?


  utter_modification_options:
    - text: "🔄 **What would you like to change?** For example: *'change destination to Rome'* or *'update my budget to 1500 euros'*"
      buttons:
        - title: "🏠 Change origin"
          payload: "/SetSlots(awaiting_review=modify)"
        - title: "📍 Change destination"
          payload: "/SetSlots(awaiting_review=modify)"
        - title: "📅 Change dates"
          payload: "/SetSlots(awaiting_review=modify)"
        - title: "💰 Change budget"
          payload: "/SetSlots(awaiting_review=modify)"
        - title: "🚗 Change transport"
          payload: "/SetSlots(awaiting_review=modify)"
        - title: "🌱 Change eco level"
          payload: "/SetSlots(awaiting_review=modify)"
        - title: "✅ Looks good, confirm"
          payload: "/SetSlots(awaiting_review=confirm)"

  utter_ask_fetch_travel_options_confirmed:
    - text: "🌱 I’ve calculated the carbon impact. Would you like me to fetch live travel/ticket options now?"
      buttons:
        - title: "Yes, fetch live options"
          payload: "/SetSlots(fetch_travel_options_confirmed=true)"
        - title: "No, show summary only"
          payload: "/SetSlots(fetch_travel_options_confirmed=false)"

  utter_ask_final_booking_decision:
    - text: "Please review the trip summary. What would you like to do next?"
      buttons:
        - title: "✅ Confirm Trip"
          payload: "/SetSlots(final_booking_decision=confirm)"
        - title: "✏️ Modify Trip"
          payload: "/SetSlots(final_booking_decision=modify)"
        - title: "❌ Cancel Trip"
          payload: "/SetSlots(final_booking_decision=cancel)"
        - title: "🔄 Start Again"
          payload: "/SetSlots(final_booking_decision=restart)"

actions:
  - action_review_trip_details
  - action_fetch_destination_info
  - action_validate_travel_date
  - action_session_start
  - action_fetch_travel_options
  - action_calculate_carbon
  - action_fetch_eco_hotels
  - action_get_cultural_info
  - action_get_eco_tips
  - action_get_activities
  - action_get_offset_programs
  - action_human_handover
  - action_handle_fallback
  - action_build_itinerary_package
  - action_complete_itinerary
  - action_restart
  - action_default_fallback
  - action_display_itinerary_summary
  - action_cancel_booking

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true



