# nginx.conf — NovaPlan HuggingFace Spaces
# Listens on 8501 (the single HF public port)
# Routes:
#   /         → 200 health JSON  (HF health check, never fails)
#   /ui/*     → Streamlit :8502  (WebSocket-aware proxy)
#   /api/*    → FastAPI   :8080  (Rasa REST proxy)

worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    client_max_body_size 10M;

    # Temp dirs writable by non-root user 1000
    client_body_temp_path  /tmp/nginx_client_body;
    proxy_temp_path        /tmp/nginx_proxy;
    fastcgi_temp_path      /tmp/nginx_fastcgi;
    uwsgi_temp_path        /tmp/nginx_uwsgi;
    scgi_temp_path         /tmp/nginx_scgi;

    # Upstream backends 
    upstream streamlit {
        server 127.0.0.1:8502;
    }

    upstream api {
        server 127.0.0.1:8080;
    }

    server {
        listen 8501;
        server_name _;

        # Health check 
        location = / {
            default_type application/json;
            return 200 '{"status":"ok","service":"NovaPlan Backend","ui":"/ui/"}';
        }

        # Rasa API
        location /api/ {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;

        }

        location = /docs {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location = /redoc {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location = /openapi.json {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Streamlit UI 
        location /ui/ {
            proxy_pass         http://streamlit;
            proxy_http_version 1.1;

            # WebSocket header
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_set_header   Host              127.0.0.1:8502;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout  86400s;   # keep WS alive
            proxy_send_timeout  86400s;
            proxy_buffering     off;      # stream responses immediately
        }

        # Streamlit static assets and internal endpoints (_stcore, static, etc.)
        location ~ ^/(static|_stcore|component)/ {
            proxy_pass         http://streamlit/ui/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       127.0.0.1:8502;
            proxy_buffering    off;
        }
    }
}
