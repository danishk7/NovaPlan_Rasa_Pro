version: "3.1"

stories:

# ─────────────────────────────────────────────────────────────────────────────
# HAPPY PATH TESTS
# ─────────────────────────────────────────────────────────────────────────────
- story: test greet then plan trip
  steps:
    - intent: greet
    - action: utter_greet
    - intent: book_trip
    - action: booking_form
    - active_loop: booking_form

- story: test complete booking — happy path
  steps:
    - intent: greet
    - action: utter_greet
    - intent: book_trip
    - action: booking_form
    - active_loop: booking_form
    - intent: provide_origin
      entities:
        - origin: Berlin
    - slot_was_set:
        - origin: Berlin
    - action: booking_form
    - active_loop: booking_form
    - intent: provide_destination
      entities:
        - destination: Amsterdam
    - slot_was_set:
        - destination: Amsterdam
    - action: booking_form
    - active_loop: booking_form
    - intent: provide_dates
      entities:
        - travel_dates: "15-20 June"
    - slot_was_set:
        - travel_dates: "15-20 June"
    - action: booking_form
    - active_loop: booking_form
    - intent: provide_num_travellers
      entities:
        - num_travellers: 2
    - slot_was_set:
        - num_travellers: 2
    - action: booking_form
    - active_loop: booking_form
    - intent: provide_budget
      entities:
        - budget_amount: 1000
    - slot_was_set:
        - budget_amount: 1000
    - action: booking_form
    - active_loop: booking_form
    - intent: provide_transport_mode
      entities:
        - transport_mode: train
    - slot_was_set:
        - transport_mode: train
    - action: booking_form
    - active_loop: booking_form
    - intent: provide_eco_level
      entities:
        - eco_level: high
    - slot_was_set:
        - eco_level: high
    - action: booking_form
    - active_loop: null
    - slot_was_set:
        - requested_slot: null
    - action: action_display_itinerary_summary
    - intent: confirm_itinerary
    - action: action_complete_itinerary
    - action: utter_booking_confirmed

