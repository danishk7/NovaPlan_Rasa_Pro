    - action: action_cancel_itinerary
    - active_loop: null

- story: test start over during form
  steps:
    - intent: book_trip
    - action: booking_form
    - active_loop: booking_form
    - intent: start_over
    - action: action_restart
    - active_loop: null

- story: test fallback then continue
  steps:
    - intent: nlu_fallback
    - action: action_handle_fallback
    - intent: book_trip
    - action: booking_form
    - active_loop: booking_form

